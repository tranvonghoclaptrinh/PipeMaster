<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pipe Master Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef } = React;
        
        function exportGameState(){

        return {
        grid: gameGrid.map(row =>
        row.map(cell => ({
        type: cell.type,
        pipeType: cell.pipeType,
        rotation: cell.rotation,
        destroyed: cell.destroyed || false
        }))
        ),
        coins: coins,
        shovels: shovels,
        shovelCost: 50
        };

        }

        window.exportGameState = exportGameState;
        const getSaveKey = (playerName) => `pipe_master_save_${playerName}`;
        const getWinCountKey = (playerName) => `pipe_master_wins_${playerName}`;
// ===== AUDIO SYSTEM =====
        const AUDIO = {
            rotate: new Audio("audio/xoayong.mp3"),
            break: new Audio("audio/break.mp3"),
            complete: new Audio("audio/complete.mp3"),
            hint: new Audio("audio/hint.mp3"),
            click: new Audio("audio/click.mp3"),
            win: new Audio("audio/win.mp3"),
            breakrock: new Audio("audio/breakrock.mp3"),
            error: new Audio("audio/error.mp3"),
            background: new Audio("audio/background.mp3"),
            gameplay: new Audio("audio/gameplay.mp3")
        };

        function playSound(name, volume = 1) {
            const a = AUDIO[name];
            if (!a) return;
            a.pause();
            a.currentTime = 0;
            a.volume = volume;
            a.play().catch(()=>{});
        }

        // hint đặc biệt → hint xong mới break
        function playHintBreak() {
            const hint = AUDIO.hint;
            const br = AUDIO.break;

            hint.pause();
            hint.currentTime = 0;
            hint.volume = 1;
            hint.play().catch(()=>{});

            hint.onended = () => {
                br.pause();
                br.currentTime = 0;
                br.volume = 1;
                br.play().catch(()=>{});
            };
        }
        function playCompleteThenWin() {

            const complete = AUDIO.complete;
            const win = AUDIO.win;

            // reset complete
            complete.pause();
            complete.currentTime = 0;
            complete.volume = 1;

            // khi complete kết thúc → phát win
            complete.onended = () => {
                win.pause();
                win.currentTime = 0;
                win.volume = 1;
                win.play().catch(()=>{});
            };

            complete.play().catch(()=>{});
        }
        function playBackground() {
            const bg = AUDIO.background;
            bg.loop = true;
            bg.volume = 0.5;
            bg.play().catch(()=>{});
        }

        function stopBackground() {
            const bg = AUDIO.background;
            bg.pause();
            bg.currentTime = 0;
        }

        function playGameplay() {
            const gm = AUDIO.gameplay;
            gm.loop = true;
            gm.volume = 0.6;
            gm.play().catch(()=>{});
        }

        function stopGameplay() {
            const gm = AUDIO.gameplay;
            gm.pause();
            gm.currentTime = 0;
        }

        const GRID_SIZE = 15; 
        const WIN_BONUS = 800; 
        const COIN_VALUE = 50;
        const SHOVEL_PRICE = 100;
        const REQUIRED_COINS_COUNT = 30; 
        const PIPE_TYPES = ['STRAIGHT', 'ELBOW', 'TEE', 'CROSS'];
        const PIPE_CONNS = {
            SOURCE: [0, 1, 0, 0], 
            SINK: [0, 0, 0, 1], 
            STRAIGHT: [0, 1, 0, 1], 
            ELBOW: [0, 1, 1, 0], 
            TEE: [0, 1, 1, 1], 
            CROSS: [1, 1, 1, 1],
            DIRT: [0, 0, 0, 0]
        };


        const GIFT_CODES = {
            'PIPEMASTER': { coins: 2000, msg: "Quà tặng Pipe Master! Nhận 2000 xu." },
            'FREECOINS': { coins: 800, msg: "Nhận 800 xu miễn phí!" },
            'NEWBIE': { coins: 500, msg: "Chào mừng người chơi mới! Nhận 500 xu." },
            'TOP1SERVER': { coins: 9999999, msg: "Bạn đã tìm thấy mã TOP1SERVER! Nhận 9999999 xu." }
        };

        const App = () => {
            const [playerName, setPlayerName] = useState("");
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [totalCoins, setTotalCoins] = useState(() => {
            const saved = localStorage.getItem(`pipe_master_save_${playerName}`);return saved ? JSON.parse(saved).coins : 12840;});
            const [shovelCount, setShovelCount] = useState(0);
            const [sessionCoins, setSessionCoins] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isShopOpen, setIsShopOpen] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [gameGrid, setGameGrid] = useState([]);
            const [isWon, setIsWon] = useState(false);
            const [isLost, setIsLost] = useState(false);
            const [isTutorial, setIsTutorial] = useState(false);
            const [showTutorialModal, setShowTutorialModal] = useState(false);
            const [toast, setToast] = useState(null);
            const [highlightedCells, setHighlightedCells] = useState([]);
            const [buyQuantity, setBuyQuantity] = useState(1);
            const [giftCodeInput, setGiftCodeInput] = useState("");
            const [usedCodes, setUsedCodes] = useState([]);
            const [hasSaved, setHasSaved] = useState(false);
            const [tutorialRock, setTutorialRock] = React.useState(null);
            const [winCount, setWinCount] = useState(0);

            const [isAIVisible, setIsAIVisible] = useState(false);

            // NEW MENU STATES
            const [mailOpen, setMailOpen] = useState(false);
            const [notificationsOpen, setNotificationsOpen] = useState(false);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [leaderboard, setLeaderboard] = useState([]);
            const [dailyMissions, setDailyMissions] = useState([]);
            const [weeklyMissions, setWeeklyMissions] = useState([]);
            const [leaderboardExpanded, setLeaderboardExpanded] = useState(false);
            const [missionView, setMissionView] = useState("daily");
            const [remainingDaily, setRemainingDaily] = useState("24h : 00m");
            const [remainingWeekly, setRemainingWeekly] = useState("6d : 00h");
            const [equippedSkinId, setEquippedSkinId] = useState(() => {
            const saved = localStorage.getItem(`skin_data_${playerName}`);return saved ? JSON.parse(saved).equippedSkin : "default";});
            const [ownedSkins, setOwnedSkins] = useState(() => {
            const saved = localStorage.getItem(`skin_data_${playerName}`);
            return saved ? JSON.parse(saved).ownedSkins : ["default"];});
            const [showShop, setShowShop] = useState(false);
            const currentSkin = FLOW_SKINS[equippedSkinId] || FLOW_SKINS.default;
            const toggleAI = () => {
                if (!window.toggleAI) return;
                const running = window.toggleAI();
                setIsAIVisible(!!running);
            };
            const resetAIState = (hidePanel = true) => {
                if (window.resetPipeAI) window.resetPipeAI();
                setAiLogs([]);
                if (hidePanel) setIsAIVisible(false);
            };
            useEffect(() => {
                if (!playerName) {
                    setWinCount(0);
                    return;
                }
                const savedWins = parseInt(localStorage.getItem(getWinCountKey(playerName)) || "0", 10);
                setWinCount(Number.isNaN(savedWins) ? 0 : savedWins);
            }, [playerName]);

            // MAIL SYSTEM
            const loadMails = () => {
                const mails = [
                    { id: 1, title: "🎉 Chào mừng", description: "Chào mừng bạn đến với Pipe Master Pro! Nhận 100 xu quà tặng.", time: "2 giờ trước", coins: 100 },
                    { id: 2, title: "🆕 Giftcode Tân thủ", description: "Sử dụng mã NEWBIE để nhận 500 xu bonus dành riêng cho người chơi mới.", time: "1 giờ trước", coins: 500 },
                    { id: 3, title: "📢 Thông báo hệ thống", description: "Cơ chế chơi đã được cập nhật. Hãy khám phá các tính năng mới!", time: "Hôm nay", coins: 0 }
                ];
                return mails;
            };

            const claimMail = (mailId) => {
                const claimedMails = JSON.parse(localStorage.getItem(`claimed_mails_${playerName}`) || "[]");
                if (!claimedMails.includes(mailId)) {
                    claimedMails.push(mailId);
                    localStorage.setItem(`claimed_mails_${playerName}`, JSON.stringify(claimedMails));
                    const mail = loadMails().find(m => m.id === mailId);
                    if (mail && mail.coins > 0) {
                        setTotalCoins(prev => prev + mail.coins);
                        showToast(`Đã nhận ${mail.coins} xu từ hòm thư!`, "success");
                    }
                    return true;
                }
                return false;
            };

            // MISSION SYSTEM
            const initializeMissions = () => {
                const lastResetDaily = localStorage.getItem(`last_reset_daily_${playerName}`);
                const lastResetWeekly = localStorage.getItem(`last_reset_weekly_${playerName}`);
                const now = Date.now();
                const oneDay = 24 * 60 * 60 * 1000;
                const oneWeek = 7 * 24 * 60 * 60 * 1000;

                let daily = JSON.parse(localStorage.getItem(`missions_daily_${playerName}`) || "null");
                let weekly = JSON.parse(localStorage.getItem(`missions_weekly_${playerName}`) || "null");

                if (!lastResetDaily || (now - parseInt(lastResetDaily)) > oneDay) {
                    daily = [
                        { id: "d1", title: "Chơi 1 trận", progress: 0, target: 1, reward: 50, claimed: false },
                        { id: "d2", title: "Thu thập 500 xu", progress: 0, target: 500, reward: 100, claimed: false },
                        { id: "d3", title: "Sử dụng Giftcode", progress: 0, target: 1, reward: 75, claimed: false }
                    ];
                    localStorage.setItem(`missions_daily_${playerName}`, JSON.stringify(daily));
                    localStorage.setItem(`last_reset_daily_${playerName}`, now.toString());
                }

                if (!lastResetWeekly || (now - parseInt(lastResetWeekly)) > oneWeek) {
                    weekly = [
                        { id: "w1", title: "Thắng 3 trận", progress: 0, target: 3, reward: 300, claimed: false },
                        { id: "w2", title: "Thu thập 3000 xu", progress: 0, target: 3000, reward: 500, claimed: false }
                    ];
                    localStorage.setItem(`missions_weekly_${playerName}`, JSON.stringify(weekly));
                    localStorage.setItem(`last_reset_weekly_${playerName}`, now.toString());
                }

                setDailyMissions(daily);
                setWeeklyMissions(weekly);
            };

            const updateMissionProgress = (missionId, amount = 1, isWeekly = false) => {
                const missions = isWeekly ? weeklyMissions : dailyMissions;
                const mission = missions.find(m => m.id === missionId);
                if (mission && !mission.claimed) {
                    mission.progress = Math.min(mission.progress + amount, mission.target);
                    if (isWeekly) {
                        setWeeklyMissions([...missions]);
                        localStorage.setItem(`missions_weekly_${playerName}`, JSON.stringify(missions));
                    } else {
                        setDailyMissions([...missions]);
                        localStorage.setItem(`missions_daily_${playerName}`, JSON.stringify(missions));
                    }
                }
            };

            const claimMission = (missionId, isWeekly) => {
                const missions = isWeekly ? weeklyMissions : dailyMissions;
                const mission = missions.find(m => m.id === missionId);
                if (mission && !mission.claimed && mission.progress >= mission.target) {
                    mission.claimed = true;
                    setTotalCoins(prev => prev + mission.reward);
                    showToast(`Nhận ${mission.reward} xu từ nhiệm vụ!`, "success");
                    if (isWeekly) {
                        setWeeklyMissions([...missions]);
                        localStorage.setItem(`missions_weekly_${playerName}`, JSON.stringify(missions));
                    } else {
                        setDailyMissions([...missions]);
                        localStorage.setItem(`missions_daily_${playerName}`, JSON.stringify(missions));
                    }
                }
            };

            // Auto-reload missions when time resets
            useEffect(() => {
                if (isLoggedIn && !isPlaying) {
                    initializeMissions();
                }
            }, [isLoggedIn, isPlaying]);

            // LEADERBOARD SYSTEM
            const loadLeaderboard = () => {
                let fakeLeaderboard = [
                    { rank: 1, name: "Alex", coins: 40000, medal: "🥇" },
                    { rank: 2, name: "John", coins: 35000, medal: "🥈" },
                    { rank: 3, name: "Lina", coins: 32000, medal: "🥉" }
                ];

                // Kiểm tra nếu người chơi hiện tại có nhiều coins hơn rank #3
                if (isLoggedIn && totalCoins > fakeLeaderboard[2].coins) {
                    // Tìm vị trí để insert người chơi
                    let insertIndex = fakeLeaderboard.length;
                    for (let i = 0; i < fakeLeaderboard.length; i++) {
                        if (totalCoins > fakeLeaderboard[i].coins) {
                            insertIndex = i;
                            break;
                        }
                    }

                    // Tạo người chơi hiện tại
                    const currentPlayer = {
                        rank: insertIndex + 1,
                        name: playerName,
                        coins: totalCoins,
                        medal: insertIndex === 0 ? "🥇" : insertIndex === 1 ? "🥈" : insertIndex === 2 ? "🥉" : ""
                    };

                    // Insert vào vị trí đúng và cập nhật rank
                    fakeLeaderboard.splice(insertIndex, 0, currentPlayer);

                    // Cập nhật lại rank cho các phần tử sau
                    for (let i = insertIndex + 1; i < fakeLeaderboard.length; i++) {
                        fakeLeaderboard[i].rank = i + 1;
                        fakeLeaderboard[i].medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : "";
                    }

                    // Chỉ giữ top 3
                    fakeLeaderboard = fakeLeaderboard.slice(0, 3);
                }

                setLeaderboard(fakeLeaderboard);
            };

            // CLOCK SYSTEM
            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentTime(new Date());
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            // COUNTDOWN SYSTEM FOR MISSIONS
            useEffect(() => {
                const updateCountdowns = () => {
                    const daily = calculateDailyTimeRemaining();
                    const weekly = calculateWeeklyTimeRemaining();
                    setRemainingDaily(daily);
                    setRemainingWeekly(weekly);

                    // AUTO-RELOAD WHEN TIME EXPIRES
                    if (daily === "0h : 0m" && isLoggedIn) {
                        initializeMissions();
                        showToast("📅 Nhiệm vụ hàng ngày đã reset!", "success");
                    }
                    if (weekly === "0d : 0h" && isLoggedIn) {
                        initializeMissions();
                        showToast("🎯 Nhiệm vụ hàng tuần đã reset!", "success");
                    }
                };
                updateCountdowns();
                const timer = setInterval(updateCountdowns, 1000);
                return () => clearInterval(timer);
            }, [isLoggedIn]);

            const formatTime = () => {
                const hours = String(currentTime.getHours()).padStart(2, '0');
                const minutes = String(currentTime.getMinutes()).padStart(2, '0');
                const date = String(currentTime.getDate()).padStart(2, '0');
                const month = String(currentTime.getMonth() + 1).padStart(2, '0');
                return `${hours}:${minutes}`;
            };

            const calculateDailyTimeRemaining = () => {
                const now = new Date();
                const tomorrow = new Date(now);
                tomorrow.setDate(tomorrow.getDate() + 1);
                tomorrow.setHours(0, 0, 0, 0);
                const diff = tomorrow - now;
                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                return `${hours}h : ${minutes}m`;
            };

            const calculateWeeklyTimeRemaining = () => {
                const now = new Date();
                const nextWeek = new Date(now);
                nextWeek.setDate(nextWeek.getDate() + 7);
                nextWeek.setHours(0, 0, 0, 0);
                const diff = nextWeek - now;
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                return `${days}d : ${hours}h`;
            };

            // Initialize on login
            useEffect(() => {
                if (isLoggedIn && !isPlaying) {
                    loadLeaderboard();
                    initializeMissions();
                }
            }, [isLoggedIn, isPlaying, totalCoins]);

            const [aiLogs, setAiLogs] = useState([]); // State để lưu log hiển thị bên phải
            const gameGridRef = useRef(gameGrid);
            const sessionCoinsRef = useRef(sessionCoins);
            const shovelCountRef = useRef(shovelCount);

            useEffect(() => {
                gameGridRef.current = gameGrid;
                sessionCoinsRef.current = sessionCoins;
                shovelCountRef.current = shovelCount;
            }, [gameGrid, sessionCoins, shovelCount]);

            const createAIInstance = () => {
                window.initPipeAI({
                    getState: () => ({
                        grid: gameGridRef.current,
                        coins: sessionCoinsRef.current,
                        shovels: shovelCountRef.current,
                        shovelCost: SHOVEL_PRICE
                    }),
                    actions: {
                        rotate: (r,c,rot) => {
                            const newGrid = JSON.parse(JSON.stringify(gameGridRef.current));
                            newGrid[r][c].rotation = rot;
                            updateFlow(newGrid, sessionCoinsRef.current, shovelCountRef.current);
                            setGameGrid(newGrid);
                        },
                        destroy: (r,c) => {
                            const newGrid = JSON.parse(JSON.stringify(gameGridRef.current));
                            newGrid[r][c].type = getRandomPipe();
                            setShovelCount(shovelCountRef.current - 1);
                            updateFlow(newGrid, sessionCoinsRef.current, shovelCountRef.current - 1);
                            setGameGrid(newGrid);
                        },
                        buy: () => {
                            if (sessionCoinsRef.current >= SHOVEL_PRICE) {
                                setSessionCoins(sessionCoinsRef.current - SHOVEL_PRICE);
                                setShovelCount(shovelCountRef.current + 1);
                            }
                        },
                        hint: () => {
                            handleFlushHint();
                        }
                    },
                    logger: (msg) => {
                        setAiLogs(prev => [...prev, {time: new Date().toLocaleTimeString(), text: msg}]);
                    }
                });
            };

            // initialize solver once and keep reference to latest state
            useEffect(() => {
                createAIInstance();
            }, []);
            useEffect(() => {
                if (!isPlaying) {
                    resetAIState(true);
                }
            }, [isPlaying]);
            useEffect(() => {
                if (!isPlaying) return;
                const timer = setInterval(() => {
                    const running = window.isPipeAIRunning ? window.isPipeAIRunning() : false;
                    setIsAIVisible(running);
                }, 250);
                return () => clearInterval(timer);
            }, [isPlaying]);
            useEffect(() => {

                // giữ class body như bạn đang dùng
                document.body.classList.toggle('game-active', isPlaying);

                // chưa login → không phát gì
                if (!isLoggedIn) return;

                if (isPlaying) {

                    // tắt background
                    AUDIO.background.pause();
                    AUDIO.background.currentTime = 0;

                    // bật gameplay
                    AUDIO.gameplay.loop = true;
                    AUDIO.gameplay.volume = 0.6;

                    AUDIO.gameplay.play().catch(()=>{});

                } else {

                    // tắt gameplay
                    AUDIO.gameplay.pause();
                    AUDIO.gameplay.currentTime = 0;

                    // bật background
                    AUDIO.background.loop = true;
                    AUDIO.background.volume = 0.5;

                    AUDIO.background.play().catch(()=>{});

                }

            }, [isPlaying, isLoggedIn]);

            useEffect(() => {
                if (isPlaying) {
                    SkinManager.applySkin(equippedSkinId);
                    
                }
            }, [GRID_SIZE, equippedSkinId]);
            useEffect(() => {
                const handleSkinUpdate = (e) => {
                    setEquippedSkinId(e.detail.skinId);
                };
                const handleCoinUpdate = (e) => {
                    setTotalCoins(e.detail.newCoins);
                };

                window.addEventListener('updateReactSkin', handleSkinUpdate);
                window.addEventListener('updateReactCoins', handleCoinUpdate);
                
                return () => {
                    window.removeEventListener('updateReactSkin', handleSkinUpdate);
                    window.removeEventListener('updateReactCoins', handleCoinUpdate);
                };
            }, []);

    const showToast = (message, type = "info") => {

    let bg = "bg-slate-700 text-white";

    if (type === "warning")
        bg = "bg-yellow-400 text-black border-4 border-yellow-600";

    if (type === "error")
        bg = "bg-red-500 text-white border-4 border-red-700";

    if (type === "success")
        bg = "bg-green-500 text-white border-4 border-green-700";


    // container ở TOP, căn giữa ngang
    const wrapper = document.createElement("div");
    wrapper.className =
        "fixed inset-x-0 top-6 z-[20000] flex justify-center pointer-events-none";


    const toast = document.createElement("div");
    toast.className =
        `px-10 py-5
         text-xl md:text-2xl
         font-black
         rounded-2xl
         shadow-2xl
         ${bg}
         animate-bounce`;

    toast.innerHTML = message;

    wrapper.appendChild(toast);
    document.body.appendChild(wrapper);


    setTimeout(() => {

        toast.style.opacity = "0";
        toast.style.transform = "translateY(-10px) scale(0.95)";
        toast.style.transition = "all 0.3s";

        setTimeout(() => wrapper.remove(), 300);

    }, 2000);
};

            const handleLogin = (e) => {

                e.preventDefault();

                playSound("click", 0.5);

                if (playerName.trim().length >= 2) {

                    setIsLoggedIn(true);

                    AUDIO.background.loop = true;
                    AUDIO.background.volume = 0.5;

                    AUDIO.background.play().catch(()=>{});
                }
            };

            const handleRedeemGiftcode = () => {
                const code = giftCodeInput.trim().toUpperCase();
                if (!code) return;

                if (usedCodes.includes(code)) {
                    showToast("Mã này đã được sử dụng!", "error");
                    return;
                }

                if (GIFT_CODES[code]) {
                    const gift = GIFT_CODES[code];
                    setTotalCoins(prev => prev + gift.coins);
                    setUsedCodes(prev => [...prev, code]);
                    setGiftCodeInput("");
                    showToast(gift.msg, "success");

                    // UPDATE MISSIONS
                    updateMissionProgress("d3", 1, false); // Sử dụng Giftcode
                } else {
                    showToast("Mã Giftcode không hợp lệ!", "error");
                }
            };

            const getRandomPipe = () => PIPE_TYPES[Math.floor(Math.random() * PIPE_TYPES.length)];

            const findPathAStar = (grid, ignoreDirt = false) => {
                const start = { r: 0, c: 0 };
                const goal = { r: GRID_SIZE - 1, c: GRID_SIZE - 1 };
                const h = (pos) => Math.abs(pos.r - goal.r) + Math.abs(pos.c - goal.c);
                const openSet = [{ ...start, g: 0, f: h(start), path: [start] }];
                const closedSet = new Set();

                while (openSet.length > 0) {
                    openSet.sort((a, b) => a.f - b.f);
                    const current = openSet.shift();
                    const key = `${current.r},${current.c}`;
                    if (current.r === goal.r && current.c === goal.c) return current.path;
                    closedSet.add(key);
                    const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                    for (let [dr, dc] of dirs) {
                        const nr = current.r + dr, nc = current.c + dc;
                        if (nr < 0 || nr >= GRID_SIZE || nc < 0 || nc >= GRID_SIZE) continue;
                        if (closedSet.has(`${nr},${nc}`)) continue;
                        if (!ignoreDirt && grid[nr][nc].type === 'DIRT') continue;
                        const weight = grid[nr][nc].type === 'DIRT' ? 10 : 1;
                        const tentativeG = current.g + weight;
                        const existing = openSet.find(o => o.r === nr && o.c === nc);

    >
        {/* SOURCE */}
        {pipe.type === 'SOURCE' && (
            <g>
                <path d="M40 50 L100 50" className={pipe.active ? "flowing" : ""} strokeWidth="28" strokeLinecap="round"/> 
                <text 
            x="50" 
            y="50" 
            fontSize="100" 
            textAnchor="middle" 
            dominantBaseline="middle"
            style={{ pointerEvents: 'none', userSelect: 'none', opacity: 0.8 }}
        >
            🔳
        </text>
       <text 
            x="50" 
            y="50" 
            fontSize="75" 
            textAnchor="middle" 
            dominantBaseline="middle"
            /* - Luôn xoay: dùng class "source-valve-rotating" 
               - Tâm xoay phải trùng với tọa độ x, y của icon (25px 50px)
            */
            className="source-valve-rotating"
            style={{ 
                pointerEvents: 'none', 
                userSelect: 'none',
                transformOrigin: '25px 50px', // Rất quan trọng để xoay đúng tâm icon
                display: 'inline-block',
                filter: pipe.active ? `drop-shadow(0 0 8px currentColor)` : 'none',
                transition: 'filter 0.3s'
            }}
        >🛟</text>
            </g>
        )}

        {/* SINK (Điểm đích) */}
        {pipe.type === 'SINK' && (
            <g>
                <circle cx="50" cy="50" r="42" stroke="currentColor" strokeWidth="4" strokeDasharray="4 4" opacity="0.3"/>
                <path d="M0 50 L30 50" className={pipe.active ? "flowing" : ""} strokeWidth="28" strokeLinecap="round"/>
                {/* Van xả: Tự động lấy màu Skin khi active */}
                <g style={{ color: pipe.active ? currentSkin.color : "#475569" }}>
                    <circle cx="50" cy="50" r="30" stroke="currentColor" strokeWidth="6"/>
                    <path d="M50 20 L50 80 M20 50 L80 50" stroke="currentColor" strokeWidth="4"/>
                    <circle cx="50" cy="50" r="8" fill="currentColor"/>
                    <circle cx="50" cy="20" r="4" fill="currentColor"/>
                    <circle cx="50" cy="80" r="4" fill="currentColor"/>
                    <circle cx="20" cy="50" r="4" fill="currentColor"/>
                    <circle cx="80" cy="50" r="4" fill="currentColor"/>
                </g>
            </g>
        )}

        {/* STRAIGHT */}
        {pipe.type === 'STRAIGHT' && (
            <path d="M0 50 L100 50" className={pipe.active ? "flowing" : ""} strokeWidth="28" strokeLinecap="round"/>
        )}

        {/* ELBOW */}
        {pipe.type === 'ELBOW' && (
            <path d="M50 100 Q50 50 100 50" className={pipe.active ? "flowing" : ""} strokeWidth="28" strokeLinecap="round"/>
        )}

        {/* TEE */}
        {pipe.type === 'TEE' && (
            <g>
                <path d="M0 50 L100 50" strokeWidth="28" strokeLinecap="round"/>
                <path d="M50 50 L50 100" className={pipe.active ? "flowing" : ""} strokeWidth="28" strokeLinecap="round"/>
            </g>
        )}

        {/* CROSS */}
        {pipe.type === 'CROSS' && (
            <g>
                <path d="M0 50 L100 50" strokeWidth="28" strokeLinecap="round"/>
                <path d="M50 0 L50 100" className={pipe.active ? "flowing" : ""} strokeWidth="28" strokeLinecap="round"/>
            </g>
        )}
    </g>
</svg>
                                            )}
                                        </div>
                                    )))}
                                </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {isWon && (
                        <div className="fixed inset-0 z-[10001] bg-black/95 flex items-center justify-center p-6 text-center">
                            <div className="glass-card p-12 max-w-md w-full border-2 border-cyan-500">
                                <div className="text-7xl mb-6">🏆</div>
                                <h2 className="text-4xl font-black text-cyan-400 mb-8 uppercase italic">CHIẾN THẮNG!</h2>
                                <button
                                    onClick={() => {

                                        playSound("win", 0.5);

                                        stopGameplay();
                                        playBackground();

                                        // cộng coin vào tài khoản chính
                                        const reward = sessionCoins + WIN_BONUS;
                                        setTotalCoins(prev => prev + reward);
                                        const nextWinCount = winCount + 1;
                                        setWinCount(nextWinCount);
                                        localStorage.setItem(getWinCountKey(playerName), String(nextWinCount));

                                        // UPDATE MISSIONS
                                        updateMissionProgress("d1", 1, false); // Chơi 1 trận
                                        updateMissionProgress("w1", 1, true);  // Thắng 3 trận
                                        updateMissionProgress("d2", reward, false); // Thu thập 500 xu
                                        updateMissionProgress("w2", reward, true);  // Thu thập 3000 xu

                                        // reset trạng thái
                                        resetAIState(true);
                                        setSessionCoins(0);
                                        setIsWon(false);
                                        setIsLost(false);

                                        // QUAN TRỌNG: quay về menu chính
                                        setIsPlaying(false);

                                    }}
                                    className="play-button w-full py-5 rounded-2xl font-black text-xl text-black"
                                >
                                    <span> NHẬN {sessionCoins + WIN_BONUS} 🪙</span>
                                </button>
                            </div>
                        </div>
                    )}

                    {isLost && (
                        <div className="fixed inset-0 z-[10001] bg-black/95 flex items-center justify-center p-6 text-center">
                            <div className="glass-card p-12 max-w-md w-full border-2 border-red-500">
                                <div className="text-7xl mb-6">💀</div>
                                <h2 className="text-4xl font-black text-red-500 mb-4 uppercase italic">GAME OVER</h2>
                                <p className="text-slate-400 mb-8 text-sm italic">Bạn đã hết sạch xẻng và không còn xu nào trên bản đồ để thu thập!</p>
                                <button
onClick={() => {

    playSound("click", 0.5);

    stopGameplay();
    playBackground();

    // xóa save
    localStorage.removeItem(getSaveKey(playerName));

    // reset trạng thái
    resetAIState(true);
    setIsLost(false);
    setIsWon(false);

    // tạo map mới
    generatePuzzle(false);

}}
className="play-button w-full py-5 rounded-2xl font-black text-xl text-black bg-gradient-to-r from-red-500 to-orange-500"
>
THỬ LẠI MÀN MỚI
</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
<script src="script.js"></script>
</body>
</html>
